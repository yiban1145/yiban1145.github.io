<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>陈鸿涛的作品 · 官网</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(ellipse at 30% 20%, #0b0c1e 0%, #030514 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.2rem;
      position: relative;
      overflow-x: hidden;
    }

    /* 装饰星点背景 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(2px 2px at 15px 60px, rgba(255, 255, 255, 0.8), transparent),
        radial-gradient(2px 2px at 75vw 30vh, #aaccff, transparent),
        radial-gradient(1px 1px at 85vw 15vh, white, transparent),
        radial-gradient(2px 2px at 20vw 80vh, #b8d0ff, transparent),
        radial-gradient(1px 1px at 65vw 70vh, #ffffff, transparent),
        radial-gradient(2px 2px at 90vw 85vh, #9bb0f0, transparent),
        radial-gradient(1px 1px at 10vw 45vh, #e0e8ff, transparent),
        radial-gradient(2px 2px at 40vw 10vh, #ffffff, transparent);
      background-size: 200px 200px;
      opacity: 0.7;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 750px;
      background: rgba(12, 15, 30, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(100, 140, 255, 0.25);
      border-radius: 2.8rem;
      padding: 2.8rem 2.2rem;
      box-shadow: 0 30px 50px rgba(0, 14, 50, 0.7), 0 0 0 1px rgba(70, 130, 255, 0.2) inset;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: all 0.2s ease;
    }

    .title-section {
      margin-bottom: 2.8rem;
    }

    .brand-name {
      font-size: clamp(2.2rem, 7vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #e0ecff 0%, #b0cbff 40%, #ffffff 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 4px 12px rgba(0, 160, 255, 0.6));
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1.3rem;
      font-weight: 400;
      color: #b7c9f0;
      border-bottom: 2px dashed rgba(90, 150, 255, 0.5);
      display: inline-block;
      padding-bottom: 0.4rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .works-badge {
      background: rgba(20, 40, 80, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 3rem;
      padding: 0.5rem 1.8rem;
      margin: 1.8rem 0 0.8rem;
      font-size: 1.1rem;
      font-weight: 500;
      color: #c6dbff;
      border: 1px solid rgba(90, 150, 255, 0.45);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      box-shadow: 0 6px 16px rgba(0, 80, 200, 0.3);
    }

    .works-badge::before {
      content: "✦";
      font-size: 1.2rem;
      color: #ffd966;
      filter: drop-shadow(0 0 6px gold);
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin: 2.2rem 0 1.2rem;
      width: 100%;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(18, 25, 55, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 0.9rem 2rem;
      border-radius: 3rem;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: 0.8px;
      color: #eaf2ff;
      background: linear-gradient(120deg, rgba(30, 50, 100, 0.7) 0%, rgba(15, 25, 60, 0.8) 100%);
      border: 1px solid rgba(80, 150, 255, 0.5);
      box-shadow: 0 8px 18px rgba(0, 30, 80, 0.6);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .nav-link::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
      transition: left 0.5s ease;
    }

    .nav-link:hover {
      border-color: #ffd966;
      box-shadow: 0 10px 24px rgba(20, 80, 200, 0.9), 0 0 18px rgba(180, 200, 255, 0.6);
      transform: translateY(-3px);
      color: #ffffff;
      background: linear-gradient(120deg, #1e3c72, #2a4a8c);
    }

    .nav-link:hover::after {
      left: 100%;
    }

    .nav-link i {
      font-style: normal;
      font-size: 1.2rem;
      filter: drop-shadow(0 0 5px cyan);
    }

    .divider {
      width: 70px;
      height: 3px;
      background: linear-gradient(to right, #4f7eff, #b7a6ff, #4f7eff);
      border-radius: 4px;
      margin: 1.5rem 0 1rem;
      opacity: 0.9;
    }

    .contact-box {
      margin-top: 2rem;
      background: rgba(8, 12, 32, 0.6);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 2.5rem;
      padding: 1.5rem 1.8rem;
      width: 100%;
      border: 1px solid rgba(120, 160, 255, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
    }

    .contact-label {
      color: #b2c9ff;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 400;
      opacity: 0.8;
    }

    .email-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.08);
      padding: 0.7rem 1.8rem;
      border-radius: 3rem;
      text-decoration: none;
      color: #f0f4ff;
      font-weight: 500;
      font-size: 1.1rem;
      border: 1px solid rgba(210, 220, 255, 0.55);
      transition: 0.25s;
      word-break: break-all;
      backdrop-filter: blur(5px);
    }

    .email-link:hover {
      background: rgba(55, 90, 180, 0.5);
      border-color: #ffcc80;
      color: white;
      box-shadow: 0 0 20px #3f6bff;
    }

    .email-icon {
      font-size: 1.3rem;
      filter: drop-shadow(0 0 5px #aaccff);
    }

    .footer-note {
      margin-top: 1.8rem;
      color: #7b8bb0;
      font-size: 0.8rem;
      letter-spacing: 1px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.2rem;
    }

    @media (max-width: 480px) {
      .container {
        padding: 2rem 1.2rem;
      }
      .nav-link {
        padding: 0.8rem 1.4rem;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-section">
      <h1 class="brand-name">陈鸿涛的作品</h1>
      <div class="subtitle">· 官网 ·</div>
      <div class="works-badge">
        <span>我们的作品</span>
      </div>
    </div>

    <!-- 导航链接区域：主用与备用hello导航 -->
    <div class="nav-links">
      <!-- 主用链接 (yiban1145.github.io) -->
      <a href="https://yiban1145.github.io/" target="_blank" rel="noopener noreferrer" class="nav-link">
        <i>🌐</i> 前往hello导航
        <span style="font-size:0.8rem; margin-left:0.2rem; opacity:0.9;">(主用)</span>
      </a>
      
      <!-- 备用链接 (miyo.xn--yfrs56bche.top/1/319/) -->
      <a href="https://miyo.xn--yfrs56bche.top/1/319/" target="_blank" rel="noopener noreferrer" class="nav-link">
        <i>🛰️</i> 前往hello导航
        <span style="font-size:0.8rem; margin-left:0.2rem; opacity:0.9;">(备用)</span>
      </a>
    </div>

    <div class="divider"></div>

    <!-- 联系方式：按需求使用指定邮箱发送 -->
    <div class="contact-box">
      <span class="contact-label">📬 需要联系 · 发送邮件</span>
      <a href="mailto:1017977452@qq.com" class="email-link">
        <span class="email-icon">✉️</span> 1017977452@qq.com
      </a>
      <p style="color:#9aadde; font-size:0.85rem; margin-top:0.3rem;">
        如果有需要，请用该邮箱发送给我
      </p>
    </div>

    <div class="footer-note">
      <span>© 陈鸿涛 · 作品集</span>
      <span>✦ 探索创作 ✦</span>
    </div>
  </div>

  <!-- 语义化隐藏描述，便于搜索引擎/阅读 -->
</body>
</html>

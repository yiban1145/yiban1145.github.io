<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>陈鸿涛的作品 · 官网</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(ellipse at 30% 20%, #0b0c1e 0%, #030514 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.2rem;
      position: relative;
      overflow-x: hidden;
    }

    /* 装饰星点背景 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(2px 2px at 15px 60px, rgba(255, 255, 255, 0.8), transparent),
        radial-gradient(2px 2px at 75vw 30vh, #aaccff, transparent),
        radial-gradient(1px 1px at 85vw 15vh, white, transparent),
        radial-gradient(2px 2px at 20vw 80vh, #b8d0ff, transparent),
        radial-gradient(1px 1px at 65vw 70vh, #ffffff, transparent),
        radial-gradient(2px 2px at 90vw 85vh, #9bb0f0, transparent),
        radial-gradient(1px 1px at 10vw 45vh, #e0e8ff, transparent),
        radial-gradient(2px 2px at 40vw 10vh, #ffffff, transparent);
      background-size: 200px 200px;
      opacity: 0.7;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 750px;
      background: rgba(12, 15, 30, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(100, 140, 255, 0.25);
      border-radius: 2.8rem;
      padding: 2.8rem 2.2rem;
      box-shadow: 0 30px 50px rgba(0, 14, 50, 0.7), 0 0 0 1px rgba(70, 130, 255, 0.2) inset;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: all 0.2s ease;
    }

    .title-section {
      margin-bottom: 2.8rem;
    }

    .brand-name {
      font-size: clamp(2.2rem, 7vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #e0ecff 0%, #b0cbff 40%, #ffffff 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 4px 12px rgba(0, 160, 255, 0.6));
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1.3rem;
      font-weight: 400;
      color: #b7c9f0;
      border-bottom: 2px dashed rgba(90, 150, 255, 0.5);
      display: inline-block;
      padding-bottom: 0.4rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .works-badge {
      background: rgba(20, 40, 80, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 3rem;
      padding: 0.5rem 1.8rem;
      margin: 1.8rem 0 0.8rem;
      font-size: 1.1rem;
      font-weight: 500;
      color: #c6dbff;
      border: 1px solid rgba(90, 150, 255, 0.45);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      box-shadow: 0 6px 16px rgba(0, 80, 200, 0.3);
    }

    .works-badge::before {
      content: "✦";
      font-size: 1.2rem;
      color: #ffd966;
      filter: drop-shadow(0 0 6px gold);
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin: 2.2rem 0 1.2rem;
      width: 100%;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(18, 25, 55, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 0.9rem 2rem;
      border-radius: 3rem;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: 0.8px;
      color: #eaf2ff;
      background: linear-gradient(120deg, rgba(30, 50, 100, 0.7) 0%, rgba(15, 25, 60, 0.8) 100%);
      border: 1px solid rgba(80, 150, 255, 0.5);
      box-shadow: 0 8px 18px rgba(0, 30, 80, 0.6);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .nav-link::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
      transition: left 0.5s ease;
    }

    .nav-link:hover {
      border-color: #ffd966;
      box-shadow: 0 10px 24px rgba(20, 80, 200, 0.9), 0 0 18px rgba(180, 200, 255, 0.6);
      transform: translateY(-3px);
      color: #ffffff;
      background: linear-gradient(120deg, #1e3c72, #2a4a8c);
    }

    .nav-link:hover::after {
      left: 100%;
    }

    .nav-link i {
      font-style: normal;
      font-size: 1.2rem;
      filter: drop-shadow(0 0 5px cyan);
    }

    .divider {
      width: 70px;
      height: 3px;
      background: linear-gradient(to right, #4f7eff, #b7a6ff, #4f7eff);
      border-radius: 4px;
      margin: 1.5rem 0 1rem;
      opacity: 0.9;
    }

    .contact-box {
      margin-top: 2rem;
      background: rgba(8, 12, 32, 0.6);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 2.5rem;
      padding: 1.5rem 1.8rem;
      width: 100%;
      border: 1px solid rgba(120, 160, 255, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
    }

    .contact-label {
      color: #b2c9ff;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 400;
      opacity: 0.8;
    }

    .email-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.08);
      padding: 0.7rem 1.8rem;
      border-radius: 3rem;
      text-decoration: none;
      color: #f0f4ff;
      font-weight: 500;
      font-size: 1.1rem;
      border: 1px solid rgba(210, 220, 255, 0.55);
      transition: 0.25s;
      word-break: break-all;
      backdrop-filter: blur(5px);
    }

    .email-link:hover {
      background: rgba(55, 90, 180, 0.5);
      border-color: #ffcc80;
      color: white;
      box-shadow: 0 0 20px #3f6bff;
    }

    .email-icon {
      font-size: 1.3rem;
      filter: drop-shadow(0 0 5px #aaccff);
    }

    .footer-note {
      margin-top: 1.8rem;
      color: #7b8bb0;
      font-size: 0.8rem;
      letter-spacing: 1px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.2rem;
    }

    @media (max-width: 480px) {
      .container {
        padding: 2rem 1.2rem;
      }
      .nav-link {
        padding: 0.8rem 1.4rem;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>

  <!-- ========== 人机验证界面 ========== -->
  <div id="verifyOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);z-index:99999;display:flex;justify-content:center;align-items:center;font-family:'Segoe UI','Poppins','Roboto',system-ui,-apple-system,sans-serif;padding:20px;">
      <div style="max-width:600px;width:100%;background:rgba(255,255,255,0.96);border-radius:48px;box-shadow:0 25px 45px rgba(0,0,0,0.3);overflow:hidden;">
          <div style="background:#101f2c;padding:24px 28px 20px;text-align:center;color:white;border-bottom:3px solid #ffbf69;">
              <div style="font-size:48px;background:#2c3e4e;width:70px;height:70px;display:inline-flex;align-items:center;justify-content:center;border-radius:100px;margin-bottom:14px;">🧠</div>
              <h2 style="font-weight:700;font-size:1.8rem;margin-bottom:8px;">⚡ 真人验证 · 问答挑战</h2>
              <p style="font-size:0.9rem;opacity:0.85;">防止机器人 · 正确回答后即可进入官网</p>
          </div>
          <div style="padding:34px 30px 30px;">
              <div id="vQuestion" style="background:#f0f4f9;padding:20px 22px;border-radius:36px;margin-bottom:32px;text-align:center;font-size:1.55rem;font-weight:600;color:#0a2b3b;line-height:1.4;"></div>
              <div style="margin-bottom:28px;">
                  <label style="display:block;font-weight:600;margin-bottom:8px;margin-left:8px;color:#1f3e4b;">✍️ 你的答案</label>
                  <input type="text" id="vAnswer" placeholder="输入答案" autocomplete="off" style="width:100%;padding:16px 22px;font-size:1.1rem;border:2px solid #e2e8f0;border-radius:60px;outline:none;font-family:inherit;">
              </div>
              <div id="vStatus" style="background:#fff8e7;border-left:6px solid #f6b83d;padding:14px 18px;border-radius:28px;margin:20px 0 24px;font-weight:500;color:#a16207;">⚠️ 请回答当前问题，证明你不是机器人。不要觉得嘛麻麻，我们也是为了防人机</div>
              <div style="display:flex;gap:15px;flex-wrap:wrap;">
                  <button id="vVerifyBtn" style="flex:2;border:none;font-weight:600;padding:14px 26px;border-radius:40px;font-size:1rem;cursor:pointer;background:#ff9f3d;color:#2c1a0a;box-shadow:0 5px 0 #b45f1a;transform:translateY(-2px);">✓ 验证答案</button>
                  <button id="vResetBtn" style="flex:1;border:none;font-weight:600;padding:14px 26px;border-radius:40px;font-size:1rem;cursor:pointer;background:#eef2f5;color:#2c5368;border:1px solid #cddfe7;">🔄 换题</button>
              </div>
          </div>
          <div style="font-size:0.7rem;text-align:center;background:#f8fafc;padding:12px;color:#7f8c8d;border-top:1px solid #e9edf2;">🛡️ 防自动化测试 | 答对即可进入导航</div>
      </div>
  </div>

  <!-- 验证脚本 -->
  <script>
  (function(){
      const overlay = document.getElementById('verifyOverlay');
      const qEl = document.getElementById('vQuestion');
      const aEl = document.getElementById('vAnswer');
      const sEl = document.getElementById('vStatus');
      const vBtn = document.getElementById('vVerifyBtn');
      const rBtn = document.getElementById('vResetBtn');
      
      const bank = [
          {q:"中国首都在哪个城市？",a:"北京"},
          {q:"中华人民共和国成立于哪一年？",a:"1949"},
          {q:"太阳从哪边升起？",a:"东"},
          {q:"自由女神像在哪个美国城市？",a:"纽约"},
          {q:"15 + 27 等于多少？",a:"42"},
          {q:"100 除以 4 等于多少？",a:"25"},
          {q:"水的化学式是什么？",a:"H2O"},
          {q:"地球的卫星叫什么？",a:"月球"},
          {q:"世界最高的山峰是？",a:"珠穆朗玛峰"},
          {q:"一天有多少小时？",a:"24"}
      ];
      
      let cur = null;
      let passed = false;
      
      function pick(){ return bank[Math.floor(Math.random()*bank.length)]; }
      
      function check(u, a){
          u = u.trim().toLowerCase().replace(/[，,。？?！!；;：:·\s]+/g,'');
          a = a.toLowerCase().replace(/[，,。？?！!；;：:·\s]+/g,'');
          if(u===a) return true;
          if(!isNaN(u) && !isNaN(a) && Number(u)===Number(a)) return true;
          const syn = {北京:["北平"],东:["东方","东边"],纽约:["newyork"],月球:["月亮"],42:["四十二"],25:["二十五"],24:["二十四"],珠穆朗玛峰:["珠峰","everest"],H2O:["h2o","水"]};
          const vars = syn[a] || [];
          return vars.some(v=>v.toLowerCase().replace(/[，,。？?！!；;：:·\s]+/g,'')===u);
      }
      
      function load(){
          cur = pick();
          qEl.textContent = cur.q;
          aEl.value = '';
          passed = false;
          sEl.style.background='#fff8e7'; sEl.style.borderLeftColor='#f6b83d'; sEl.style.color='#a16207';
          sEl.textContent = '🔄 新题目，请输入答案';
          aEl.style.borderColor='#e2e8f0';
      }
      
      function verify(){
          if(passed){ sEl.textContent='✅ 已通过！正在进入导航…'; setTimeout(()=>overlay.style.display='none',400); return; }
          const u = aEl.value;
          if(!u.trim()){ sEl.style.background='#fff0f0'; sEl.style.borderLeftColor='#d32f2f'; sEl.style.color='#b91c1c'; sEl.textContent='❌ 请输入答案'; return; }
          if(check(u,cur.a)){
              passed = true;
              sEl.style.background='#ecfdf3'; sEl.style.borderLeftColor='#2b7e3a'; sEl.style.color='#166534';
              sEl.textContent = '✅ 验证通过！正在进入导航…';
              aEl.style.borderColor='#2b7e3a';
              setTimeout(()=>overlay.style.display='none',600);
          } else {
              sEl.style.background='#fff0f0'; sEl.style.borderLeftColor='#d32f2f'; sEl.style.color='#b91c1c';
              sEl.textContent = '❌ 答案不正确，请重试或换题';
              aEl.style.borderColor='#d32f2f';
              aEl.focus();
          }
      }
      
      vBtn.addEventListener('click', verify);
      rBtn.addEventListener('click', load);
      aEl.addEventListener('keydown', function(e){ if(e.key==='Enter') verify(); });
      
      load();
  })();
  </script>
  <div class="container">
    <div class="title-section">
      <h1 class="brand-name">陈鸿涛的作品</h1>
      <div class="subtitle">· 官网 ·</div>
      <div class="works-badge">
        <span>我们的作品</span>
      </div>
    </div>

    <!-- 导航链接区域：主用与备用hello导航 -->
    <div class="nav-links">
      <!-- 主用链接 (yiban1145.github.io) -->
      <a href="https://yiban1145.github.io/wodezhuoping/" target="_blank" rel="noopener noreferrer" class="nav-link">
        <i>🌐</i> 前往hello导航
        <span style="font-size:0.8rem; margin-left:0.2rem; opacity:0.9;">(主用)</span>
      </a>
    </div>

    <div class="divider"></div>

    <!-- 联系方式：按需求使用指定邮箱发送 -->
    <div class="contact-box">
      <span class="contact-label">📬 需要联系 · 发送邮件</span>
      <a href="mailto:1017977452@qq.com" class="email-link">
        <span class="email-icon">✉️</span> 1017977452@qq.com
      </a>
      <p style="color:#9aadde; font-size:0.85rem; margin-top:0.3rem;">
        如果有需要，请用该邮箱发送给我
      </p>
    </div>

    <div class="footer-note">
      <span>© 陈鸿涛 · 作品集</span>
      <span>✦ 探索创作 ✦</span>
      <a href="https://github.com/yiban1145" target="_blank">前往我在github的主页</a>
    </div>
  </div>

  <!-- 语义化隐藏描述，便于搜索引擎/阅读 -->
</body>
</html>
